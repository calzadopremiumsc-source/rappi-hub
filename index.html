<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rappi Sales Hub</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bricolage+Grotesque:opsz,wght@12..96,400;12..96,600;12..96,700;12..96,800&family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
/* Hallmark · macrostructure: ecosystem-index · theme: rappi-sunrise · P5 H5 E5 S5 R4 V5 */
:root {
  /* Rappi sunrise — warm white base, coral-orange accent, Amazon deep blue complement */
  --paper:    oklch(98% 0.006 60);
  --paper-2:  oklch(96% 0.008 58);
  --paper-3:  oklch(93% 0.010 55);
  --paper-4:  oklch(89% 0.012 52);
  --rule:     oklch(82% 0.014 50);
  --rule-2:   oklch(88% 0.010 55);
  --neutral:  oklch(56% 0.012 40);
  --muted:    oklch(44% 0.010 40);
  --ink:      oklch(18% 0.012 35);
  --ink-2:    oklch(36% 0.010 38);
  --ink-dim:  oklch(52% 0.010 40);

  /* Rappi brand red-orange */
  --rappi:        #FF441F;
  --rappi-2:      #E83510;
  --rappi-3:      #FF6845;
  --rappi-glow:   oklch(65% 0.22 32 / 0.12);
  --rappi-glow-2: oklch(65% 0.22 32 / 0.06);

  /* Amazon blue complement */
  --amazon:     oklch(44% 0.16 248);
  --amazon-2:   oklch(36% 0.18 248);
  --amazon-glow:oklch(44% 0.16 248 / 0.10);

  /* Semantics */
  --success:  oklch(52% 0.16 148);
  --danger:   oklch(55% 0.18 25);
  --amber:    oklch(64% 0.16 62);
  --gold:     oklch(70% 0.14 82);
  --locked:   oklch(44% 0.16 248);

  --font-display: "Bricolage Grotesque", ui-sans-serif, system-ui, sans-serif;
  --font-body:    "Geist", ui-sans-serif, system-ui, sans-serif;
  --font-mono:    "Geist Mono", ui-monospace, monospace;

  --ease:    cubic-bezier(0.16, 1, 0.3, 1);
  --ease-in: cubic-bezier(0.4, 0, 1, 1);
  --r-sm: 7px; --r-md: 11px; --r-lg: 16px; --r-xl: 22px;

  --sidebar-w: 230px;
}

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }
html,body { overflow-x: clip; }
body { background: var(--paper); color: var(--ink); font-family: var(--font-body); font-size: 14px; line-height: 1.6; min-height: 100vh; }

/* ── HERO ────────────────────────────────────── */
.hero {
  position: relative; overflow: hidden;
  background: linear-gradient(135deg,
    oklch(22% 0.04 248) 0%,
    oklch(30% 0.06 32) 40%,
    oklch(52% 0.20 32) 70%,
    oklch(68% 0.22 38) 100%
  );
  height: 148px; flex-shrink: 0;
}
.hero-grid {
  position: absolute; inset: 0;
  background-image:
    linear-gradient(oklch(100% 0 0 / 0.04) 1px, transparent 1px),
    linear-gradient(90deg, oklch(100% 0 0 / 0.04) 1px, transparent 1px);
  background-size: 32px 32px;
}
.hero-orb-1 {
  position: absolute; width: 320px; height: 320px;
  background: radial-gradient(circle, oklch(100% 0 0 / 0.08) 0%, transparent 70%);
  right: -40px; top: -80px; border-radius: 50%;
}
.hero-orb-2 {
  position: absolute; width: 200px; height: 200px;
  background: radial-gradient(circle, oklch(44% 0.16 248 / 0.18) 0%, transparent 70%);
  right: 200px; bottom: -60px; border-radius: 50%;
}
/* abstract delivery icons SVG — right side */
.hero-deco {
  position: absolute; right: 0; top: 0; height: 100%; width: 360px;
  opacity: 0.22;
}
.hero-fade {
  position: absolute; inset: 0;
  background: linear-gradient(90deg, oklch(22% 0.04 248 / 0.6) 0%, transparent 60%);
}
.hero-content {
  position: relative; z-index: 2;
  height: 100%; display: flex; flex-direction: column;
  justify-content: center; padding: 0 28px; gap: 4px;
}
.hero-top { display: flex; align-items: center; gap: 14px; }
.hero-logo { height: 38px; width: auto; filter: brightness(0) invert(1) drop-shadow(0 2px 8px oklch(0% 0 0 / 0.3)); }
.hero-divider { width: 1.5px; height: 30px; background: oklch(100% 0 0 / 0.3); border-radius: 1px; }
.hero-title { font-family: var(--font-display); font-weight: 800; font-size: 22px; color: white; letter-spacing: -.01em; }
.hero-title span { color: oklch(80% 0.12 60); }
.hero-sub { font-size: 12px; color: oklch(100% 0 0 / 0.65); letter-spacing: .01em; margin-left: 1px; }
.hero-pills { display: flex; gap: 8px; margin-top: 2px; }
.hero-pill {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 3px 10px; border-radius: 20px;
  font-size: 10px; font-weight: 600; letter-spacing: .05em; text-transform: uppercase;
  background: oklch(100% 0 0 / 0.12); color: oklch(100% 0 0 / 0.8);
  border: 1px solid oklch(100% 0 0 / 0.2);
}

/* ── TOPBAR ──────────────────────────────────── */
.tb {
  position: sticky; top: 0; z-index: 200;
  background: oklch(98% 0.006 60 / 0.95);
  backdrop-filter: blur(14px) saturate(1.6);
  border-bottom: 1px solid var(--rule);
  display: flex; align-items: center;
  padding: 0 18px; height: 50px; gap: 0;
}
.tb-logo { display: flex; align-items: center; gap: 0; text-decoration: none; margin-right: 18px; flex-shrink: 0; }
.tb-logo img { height: 26px; width: auto; }
.tb-vline { width: 1px; height: 18px; background: var(--rule); margin-right: 14px; }
.tb-hub { font-family: var(--font-display); font-weight: 700; font-size: 13px; color: var(--ink-2); letter-spacing: .01em; }
.tb-hub span { color: var(--rappi); }
.tb-spacer { width: 16px; }
.tb-search {
  flex: 1; max-width: 380px;
  display: flex; align-items: center; gap: 7px;
  background: var(--paper-3); border: 1px solid var(--rule);
  border-radius: 9px; padding: 6px 11px;
  transition: border-color 160ms var(--ease), box-shadow 160ms;
}
.tb-search:focus-within { border-color: oklch(65% 0.22 32 / 0.4); box-shadow: 0 0 0 3px var(--rappi-glow); }
.tb-search input { background: none; border: none; outline: none; color: var(--ink); font-family: var(--font-body); font-size: 13px; width: 100%; }
.tb-search input::placeholder { color: var(--neutral); }
.tb-right { margin-left: auto; display: flex; align-items: center; gap: 9px; }
.tb-user { display: flex; align-items: center; gap: 7px; }
.tb-av { width: 26px; height: 26px; border-radius: 50%; background: var(--rappi); display: flex; align-items: center; justify-content: center; font-family: var(--font-display); font-weight: 700; font-size: 9px; color: white; }
.tb-uname { font-size: 12px; color: var(--ink-2); font-weight: 500; }
.tb-badge { padding: 2px 7px; border-radius: 20px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .07em; }
.b-admin { background: oklch(65% 0.22 32 / 0.1); color: var(--rappi); border: 1px solid oklch(65% 0.22 32 / 0.25); }
.b-user  { background: var(--amazon-glow); color: var(--amazon); border: 1px solid oklch(44% 0.16 248 / 0.25); }
.tb-btn { display: flex; align-items: center; gap: 5px; padding: 6px 12px; border-radius: var(--r-sm); font-size: 12px; font-weight: 600; font-family: var(--font-display); border: none; cursor: pointer; transition: all 150ms var(--ease); }
.btn-add { background: var(--rappi); color: white; box-shadow: 0 2px 8px oklch(65% 0.22 32 / 0.2); }
.btn-add:hover { background: var(--rappi-2); transform: translateY(-1px); box-shadow: 0 4px 14px oklch(65% 0.22 32 / 0.3); }
.btn-out { background: var(--paper-3); border: 1px solid var(--rule); color: var(--ink-dim); }
.btn-out:hover { color: var(--ink); border-color: var(--neutral); }

/* ── LAYOUT ──────────────────────────────────── */
.layout { display: flex; flex: 1; }

/* ── SIDEBAR ─────────────────────────────────── */
.sidebar {
  width: var(--sidebar-w); flex-shrink: 0;
  background: var(--paper-2);
  border-right: 1px solid var(--rule);
  position: sticky; top: 50px;
  height: calc(100vh - 50px);
  overflow-y: auto; padding: 14px 0;
}
.sidebar::-webkit-scrollbar { width: 3px; }
.sidebar::-webkit-scrollbar-thumb { background: var(--rule); border-radius: 2px; }
.sb-label { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .10em; color: var(--neutral); padding: 12px 16px 4px; }
.sb-item {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; border-left: 2px solid transparent;
  color: var(--ink-dim); font-size: 12.5px;
  transition: background 110ms, color 110ms, border-color 120ms;
  cursor: pointer;
}
.sb-item:hover { background: var(--paper-3); color: var(--ink); border-left-color: oklch(65% 0.22 32 / 0.3); }
.sb-item.active { background: oklch(65% 0.22 32 / 0.07); border-left-color: var(--rappi); color: var(--ink); font-weight: 500; }
.sb-icon { font-size: 13px; flex-shrink: 0; }
.sb-name { flex: 1; }
.sb-count { font-size: 9px; color: var(--neutral); font-family: var(--font-mono); background: var(--paper-4); padding: 1px 5px; border-radius: 8px; }
.sb-lock { font-size: 10px; color: var(--locked); }
.sb-sep { height: 1px; background: var(--rule); margin: 10px 0; }
.sb-leaders-btn {
  display: flex; align-items: center; gap: 8px;
  padding: 7px 16px; border-left: 2px solid transparent;
  color: var(--locked); font-size: 12.5px; cursor: pointer;
  transition: background 110ms; font-weight: 500;
}
.sb-leaders-btn:hover { background: var(--amazon-glow); border-left-color: var(--locked); }

/* ── MAIN ────────────────────────────────────── */
.main { flex: 1; overflow: hidden; }

/* ── CATEGORY ────────────────────────────────── */
.cat-section { border-bottom: 1px solid var(--rule-2); }
.cat-hd {
  display: flex; align-items: center; gap: 11px;
  padding: 16px 22px; cursor: pointer;
  transition: background 130ms;
  user-select: none; position: relative;
}
.cat-hd:hover { background: var(--paper-2); }
.cat-hd:hover .cat-icon { transform: scale(1.12); }
.cat-arrow { width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; color: var(--neutral); font-size: 10px; transition: transform 260ms var(--ease); flex-shrink: 0; }
.cat-arrow.open { transform: rotate(90deg); }
.cat-icon { font-size: 18px; flex-shrink: 0; transition: transform 200ms var(--ease); }
.cat-title { font-family: var(--font-display); font-weight: 700; font-size: 15px; flex: 1; color: var(--ink); }
.cat-meta { display: flex; align-items: center; gap: 7px; }
.lock-badge { display: flex; align-items: center; gap: 4px; padding: 2px 8px; border-radius: 20px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; background: var(--amazon-glow); color: var(--locked); border: 1px solid oklch(44% 0.16 248 / 0.2); }
.cat-count { font-size: 10px; color: var(--neutral); font-family: var(--font-mono); }
.cat-edit-btn { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; border-radius: 4px; border: 1px solid var(--rule); background: transparent; color: var(--neutral); font-size: 10px; cursor: pointer; transition: all 130ms; opacity: 0; }
.cat-hd:hover .cat-edit-btn { opacity: 1; }
.cat-edit-btn:hover { color: var(--ink); border-color: var(--neutral); background: var(--paper-3); }
.cat-body { overflow: hidden; max-height: 0; transition: max-height 380ms var(--ease); }
.cat-body.open { max-height: 9999px; }

/* locked block */
.locked-block { margin: 0 22px 18px; background: var(--amazon-glow); border: 1px solid oklch(44% 0.16 248 / 0.2); border-radius: var(--r-md); padding: 28px; text-align: center; }
.locked-icon { font-size: 28px; margin-bottom: 10px; }
.locked-title { font-family: var(--font-display); font-weight: 700; font-size: 15px; color: var(--locked); margin-bottom: 5px; }
.locked-sub { font-size: 12px; color: var(--ink-dim); margin-bottom: 14px; }
.lock-btn { display: inline-flex; align-items: center; gap: 6px; padding: 7px 16px; border-radius: var(--r-sm); background: var(--amazon); color: white; font-size: 12px; font-weight: 600; border: none; cursor: pointer; transition: all 150ms; font-family: var(--font-display); }
.lock-btn:hover { background: var(--amazon-2); transform: translateY(-1px); }

/* ── SUBCATEGORY ─────────────────────────────── */
.subcat-wrap { padding: 0 22px 4px; }
.subcat-title { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .10em; color: var(--neutral); padding: 13px 0 8px; display: flex; align-items: center; gap: 9px; }
.subcat-title::after { content: ''; flex: 1; height: 1px; background: var(--rule-2); }

/* ── GRID & CARDS ────────────────────────────── */
.links-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(264px, 1fr)); gap: 11px; padding-bottom: 18px; }

.lcard {
  background: var(--paper);
  border: 1px solid var(--rule-2);
  border-radius: var(--r-md);
  overflow: visible; position: relative;
  transition: border-color 180ms var(--ease), transform 180ms var(--ease), box-shadow 180ms var(--ease);
  opacity: 0; transform: translateY(8px);
  animation: card-in 360ms var(--ease) forwards;
}
@keyframes card-in { to { opacity: 1; transform: translateY(0); } }
.lcard:hover { border-color: oklch(65% 0.22 32 / 0.4); transform: translateY(-3px); box-shadow: 0 6px 24px oklch(65% 0.22 32 / 0.10), 0 2px 8px oklch(0% 0 0 / 0.06); }
.lcard::before { content: ''; position: absolute; top: -1px; left: 12%; right: 12%; height: 2px; background: var(--rappi); border-radius: 0 0 2px 2px; opacity: 0; transition: opacity 180ms var(--ease); }
.lcard:hover::before { opacity: 1; }

/* drag state (admin) */
.lcard[draggable=true] { cursor: grab; }
.lcard[draggable=true]:active { cursor: grabbing; }
.lcard.dragging { opacity: 0.4; transform: scale(0.97); }
.lcard.drag-over { border-color: var(--rappi); box-shadow: 0 0 0 2px var(--rappi-glow); }
.drag-handle { position: absolute; top: 8px; left: 8px; color: var(--rule); font-size: 12px; opacity: 0; transition: opacity 140ms; line-height: 1; cursor: grab; z-index: 5; }
.lcard:hover .drag-handle { opacity: 1; }

/* video thumb */
.vthumb { height: 132px; border-radius: var(--r-md) var(--r-md) 0 0; overflow: hidden; position: relative; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
/* YouTube-style gradient bg per video using data-hue */
.vthumb-bg { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 38px; opacity: 0.12; }
.vthumb-gradient { position: absolute; inset: 0; }
.play-btn { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
.play-circle { width: 48px; height: 48px; border-radius: 50%; background: oklch(0% 0 0 / 0.50); backdrop-filter: blur(6px); display: flex; align-items: center; justify-content: center; font-size: 17px; color: white; border: 1.5px solid oklch(100% 0 0 / 0.3); transition: transform 180ms var(--ease), background 180ms, box-shadow 180ms; }
.lcard:hover .play-circle { transform: scale(1.1); background: var(--rappi); border-color: transparent; box-shadow: 0 0 16px oklch(65% 0.22 32 / 0.4); }
.vdur { position: absolute; bottom: 7px; right: 8px; background: oklch(10% 0 0 / 0.8); color: white; font-family: var(--font-mono); font-size: 10px; padding: 2px 6px; border-radius: 4px; }
.vch { position: absolute; bottom: 7px; left: 9px; font-size: 9px; font-weight: 600; color: oklch(100% 0 0 / 0.7); background: oklch(0% 0 0 / 0.4); padding: 2px 6px; border-radius: 4px; text-transform: uppercase; letter-spacing: .04em; }

/* playbook preview tooltip */
.pb-tip { position: absolute; bottom: calc(100% + 10px); left: 0; right: 0; min-width: 260px; background: var(--paper); border: 1px solid oklch(65% 0.22 32 / 0.3); border-radius: var(--r-md); padding: 13px; z-index: 100; pointer-events: none; opacity: 0; transform: translateY(7px) scale(0.97); transition: opacity 200ms var(--ease), transform 200ms var(--ease); box-shadow: 0 16px 40px oklch(0% 0 0 / 0.14); }
.lcard:hover .pb-tip { opacity: 1; transform: translateY(0) scale(1); }
.pb-tip::after { content: ''; position: absolute; top: 100%; left: 18px; border: 6px solid transparent; border-top-color: oklch(65% 0.22 32 / 0.3); }
.tip-tag { font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--rappi); margin-bottom: 6px; }
.tip-title { font-family: var(--font-display); font-weight: 700; font-size: 12px; margin-bottom: 5px; color: var(--ink); }
.tip-body { font-size: 11px; color: var(--ink-dim); line-height: 1.5; }

/* card body */
.cbody { padding: 13px 14px; }
.ctype { display: inline-flex; align-items: center; gap: 4px; font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; margin-bottom: 4px; }
.cdot { width: 4px; height: 4px; border-radius: 50%; background: currentColor; }
.ctitle { font-family: var(--font-display); font-weight: 700; font-size: 13px; line-height: 1.3; margin-bottom: 4px; color: var(--ink); }
.cdesc { font-size: 11px; color: var(--ink-dim); line-height: 1.5; margin-bottom: 9px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
.cfoot { display: flex; align-items: center; justify-content: space-between; }
.open-btn { display: inline-flex; align-items: center; gap: 4px; padding: 5px 10px; border-radius: 6px; font-size: 11px; font-weight: 600; text-decoration: none; transition: all 140ms var(--ease); border: 1px solid; white-space: nowrap; }
.btn-rappi  { background: oklch(65% 0.22 32 / 0.08); color: var(--rappi);   border-color: oklch(65% 0.22 32 / 0.2); }
.btn-rappi:hover  { background: oklch(65% 0.22 32 / 0.16); border-color: var(--rappi); transform: translateY(-1px); }
.btn-amazon { background: var(--amazon-glow); color: var(--amazon);  border-color: oklch(44% 0.16 248 / 0.2); }
.btn-amazon:hover { background: oklch(44% 0.16 248 / 0.16); border-color: var(--amazon); transform: translateY(-1px); }
.btn-amber  { background: oklch(64% 0.16 62 / 0.08); color: var(--amber);  border-color: oklch(64% 0.16 62 / 0.2); }
.btn-amber:hover  { background: oklch(64% 0.16 62 / 0.16); border-color: var(--amber); transform: translateY(-1px); }
.btn-gold   { background: oklch(70% 0.14 82 / 0.08); color: var(--gold);   border-color: oklch(70% 0.14 82 / 0.2); }
.btn-gold:hover   { background: oklch(70% 0.14 82 / 0.16); border-color: var(--gold); transform: translateY(-1px); }

.cadmin { display: flex; gap: 3px; }
.cact { width: 24px; height: 24px; border-radius: 4px; border: 1px solid var(--rule); background: transparent; color: var(--neutral); font-size: 10px; display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all 130ms; }
.cact:hover { color: var(--ink); border-color: var(--neutral); background: var(--paper-3); }
.cact.del:hover { color: var(--danger); border-color: var(--danger); background: oklch(55% 0.18 25 / 0.06); }

.empty-cat { padding: 32px; text-align: center; color: var(--neutral); font-size: 13px; }

/* ── MOVE MODAL (change category) ───────────────── */
.move-bar { display: flex; flex-wrap: wrap; gap: 6px; padding: 4px 0 8px; }
.move-cat-btn { padding: 5px 12px; border-radius: 20px; font-size: 11px; font-weight: 600; border: 1px solid var(--rule); background: var(--paper-3); color: var(--ink-dim); cursor: pointer; transition: all 130ms; font-family: var(--font-display); }
.move-cat-btn:hover { border-color: var(--rappi); color: var(--rappi); background: oklch(65% 0.22 32 / 0.06); }
.move-cat-btn.active { border-color: var(--rappi); color: var(--rappi); background: oklch(65% 0.22 32 / 0.10); }

/* ── MODAL ───────────────────────────────────── */
.mov { position: fixed; inset: 0; z-index: 400; background: oklch(18% 0.012 35 / 0.45); backdrop-filter: blur(5px); display: none; align-items: center; justify-content: center; padding: 20px; }
.mov.open { display: flex; }
.modal { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--r-xl); width: 100%; max-width: 490px; max-height: 90vh; overflow-y: auto; padding: 28px; box-shadow: 0 20px 60px oklch(0% 0 0 / 0.18); animation: modal-in 260ms var(--ease); }
@keyframes modal-in { from { opacity: 0; transform: scale(0.97) translateY(6px); } to { opacity: 1; transform: scale(1) translateY(0); } }
.modal-title { font-family: var(--font-display); font-weight: 700; font-size: 18px; margin-bottom: 20px; color: var(--ink); }
.modal-section { font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: var(--neutral); margin: 16px 0 6px; }
.fr { margin-bottom: 13px; }
.fl { display: block; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 5px; }
.fi,.fsel,.fta { width: 100%; background: var(--paper-2); border: 1px solid var(--rule); border-radius: var(--r-sm); padding: 8px 11px; color: var(--ink); font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color 140ms var(--ease), box-shadow 140ms; }
.fi:focus,.fsel:focus,.fta:focus { border-color: var(--rappi); box-shadow: 0 0 0 3px var(--rappi-glow); }
.fsel option { background: var(--paper-2); }
.fta { resize: vertical; min-height: 64px; }
.modal-acts { display: flex; gap: 8px; margin-top: 20px; justify-content: flex-end; }
.btn-cancel { padding: 7px 15px; border-radius: var(--r-sm); border: 1px solid var(--rule); background: transparent; color: var(--ink-dim); font-family: var(--font-body); font-size: 13px; cursor: pointer; transition: all 130ms; }
.btn-cancel:hover { color: var(--ink); border-color: var(--neutral); background: var(--paper-2); }
.btn-save { padding: 7px 16px; border-radius: var(--r-sm); background: var(--rappi); border: none; color: white; font-family: var(--font-display); font-weight: 700; font-size: 13px; cursor: pointer; transition: background 130ms, transform 100ms; }
.btn-save:hover { background: var(--rappi-2); transform: translateY(-1px); }

/* ── LOGIN MODAL ─────────────────────────────── */
.login-ov { position: fixed; inset: 0; z-index: 500; background: oklch(18% 0.012 35 / 0.5); backdrop-filter: blur(6px); display: none; align-items: center; justify-content: center; padding: 20px; }
.login-ov.open { display: flex; }
.login-card { background: var(--paper); border: 1px solid var(--rule); border-radius: var(--r-xl); width: 100%; max-width: 400px; padding: 36px 32px; box-shadow: 0 24px 64px oklch(0% 0 0 / 0.16); animation: modal-in 260ms var(--ease); }
.login-logo-wrap { display: flex; justify-content: center; margin-bottom: 24px; }
.login-logo { height: 36px; width: auto; }
.login-h { font-family: var(--font-display); font-weight: 800; font-size: 22px; text-align: center; margin-bottom: 4px; color: var(--ink); }
.login-sub { font-size: 12px; color: var(--ink-dim); text-align: center; margin-bottom: 24px; }
.lf { margin-bottom: 14px; }
.lf label { display: block; font-size: 10px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 5px; }
.lf input { width: 100%; background: var(--paper-2); border: 1px solid var(--rule); border-radius: var(--r-sm); padding: 10px 13px; color: var(--ink); font-family: var(--font-body); font-size: 13px; outline: none; transition: border-color 150ms, box-shadow 150ms; }
.lf input:focus { border-color: var(--rappi); box-shadow: 0 0 0 3px var(--rappi-glow); }
.lf input::placeholder { color: var(--neutral); }
.login-err { font-size: 12px; color: var(--danger); min-height: 16px; margin-bottom: 8px; }
.login-btn { width: 100%; padding: 11px; background: var(--rappi); border: none; border-radius: var(--r-sm); color: white; font-family: var(--font-display); font-weight: 700; font-size: 14px; cursor: pointer; transition: background 150ms, transform 110ms; }
.login-btn:hover { background: var(--rappi-2); transform: translateY(-1.5px); }
.login-back { display: block; margin-top: 14px; text-align: center; font-size: 12px; color: var(--neutral); background: none; border: none; cursor: pointer; text-decoration: underline; }

/* ── TOAST ───────────────────────────────────── */
.toast { position: fixed; bottom: 22px; right: 22px; z-index: 600; background: var(--paper); border: 1px solid var(--rule); border-radius: var(--r-md); padding: 11px 16px; font-size: 13px; color: var(--ink); box-shadow: 0 8px 28px oklch(0% 0 0 / 0.12); opacity: 0; transform: translateY(8px); transition: opacity 200ms var(--ease), transform 200ms var(--ease); pointer-events: none; }
.toast.show { opacity: 1; transform: translateY(0); }
.toast.ok  { border-left: 3px solid var(--success); }
.toast.err { border-left: 3px solid var(--danger); }

.hs { display: none !important; }

@media (max-width: 768px) { .sidebar { display: none; } .links-grid { grid-template-columns: 1fr; } .hero { height: 120px; } }
@media (prefers-reduced-motion: reduce) { *,*::before,*::after { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

/* ── CUSTOM CURSOR ─────────────────────────────── */
* { cursor: none !important; }
#cur { position:fixed;z-index:9999;width:10px;height:10px;background:var(--rappi);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:width 180ms var(--ease),height 180ms var(--ease),background 180ms;top:0;left:0; }
#cur-ring { position:fixed;z-index:9998;width:34px;height:34px;border:1.5px solid oklch(65% 0.22 32 / 0.45);border-radius:50%;pointer-events:none;transform:translate(-50%,-50%);transition:width 200ms var(--ease),height 200ms var(--ease),opacity 200ms;top:0;left:0; }
body.ch #cur { width:18px;height:18px; }
body.ch #cur-ring { width:50px;height:50px;opacity:0.5; }
body.ck #cur { transform:translate(-50%,-50%) scale(0.65); }
</style>
</head>

    <main class="main" id="main"></main>

</div>

<!-- ═══ LOGIN MODAL (solo líderes) ═══ -->
<div class="login-ov" id="login-ov">
  <div class="login-card">
    <div class="login-logo-wrap"><img class="login-logo" id="login-logo-img" src="" alt="Rappi"></div>
    <div class="login-h">Recursos Líderes</div>

    <div class="lf"><label>Contraseña</label><input type="password" id="lp" placeholder="••••••••"></div>
    <div class="login-err" id="lerr"></div>
    <button class="login-btn" onclick="doLogin()">Entrar como líder</button>
    <button class="login-back" onclick="hideLogin()">← Volver al Hub</button>
  </div>
</div>

<!-- ═══ ADD/EDIT MODAL ═══ -->
<div class="mov" id="mov">
  <div class="modal">
    <div class="modal-title" id="mtitle">Agregar recurso</div>
    <div class="fr"><label class="fl">Título</label><input class="fi" id="ft" placeholder="Nombre del recurso"></div>
    <div class="fr"><label class="fl">URL</label><input class="fi" id="fu" placeholder="https://…"></div>
    <div class="fr"><label class="fl">Descripción breve</label><textarea class="fta" id="fd" placeholder="¿Para qué sirve?"></textarea></div>
    <div class="fr"><label class="fl">Tipo</label>
      <select class="fsel" id="ftype" onchange="onType()">
        <option value="link">🔗 Link general</option>
        <option value="playbook">📘 Playbook</option>
        <option value="video">🎬 Video</option>
        <option value="dashboard">📊 Dashboard / BI</option>
        <option value="sheet">📋 Spreadsheet</option>
        <option value="ticket">🎫 Ticket / Jira</option>
        <option value="ppt">📑 Presentación</option>
      </select>
    </div>
    <div class="fr" id="rdur" style="display:none"><label class="fl">Duración del video (ej: 12:30)</label><input class="fi" id="fdur" placeholder="8:42"></div>
    <div class="fr" id="rprev" style="display:none"><label class="fl">Preview al hover (playbook)</label><textarea class="fta" id="fprev" placeholder="Descripción extendida que aparece al pasar el cursor…"></textarea></div>
    <div class="fr"><label class="fl">Categoría</label><select class="fsel" id="fcat"></select></div>
    <div class="fr"><label class="fl">Subcategoría (opcional)</label><input class="fi" id="fsub" placeholder="Ej: Onboarding, Métricas…"></div>
    <div class="modal-acts">
      <button class="btn-cancel" onclick="closeModal()">Cancelar</button>
      <button class="btn-save" onclick="saveLink()">Guardar</button>
    </div>
  </div>
</div>


<!-- ═══ NUEVA CATEGORÍA ═══ -->
<div id="new-cat-bar" style="padding:20px 24px;border-top:1px solid var(--rule-2);display:flex;align-items:center;gap:12px;background:var(--paper-2);">
  <span style="font-size:13px;color:var(--neutral)">¿Necesitas una sección nueva?</span>
  <button onclick="openNewCat()" style="display:inline-flex;align-items:center;gap:6px;padding:7px 16px;border-radius:var(--r-sm);background:var(--rappi);border:none;color:white;font-family:var(--font-display);font-weight:700;font-size:13px;cursor:pointer;transition:background 140ms,transform 110ms" onmouseover="this.style.background='var(--rappi-2)';this.style.transform='translateY(-1px)'" onmouseout="this.style.background='var(--rappi)';this.style.transform=''">
    + Nueva categoría
  </button>
</div>

<!-- ═══ MODAL NUEVA CATEGORÍA ═══ -->
<div class="mov" id="cat-modal">
  <div class="modal">
    <div class="modal-title">Nueva categoría</div>
    <div class="fr"><label class="fl">Ícono (emoji)</label><input class="fi" id="nc-icon" placeholder="📁" maxlength="4" style="font-size:22px;text-align:center;width:70px"></div>
    <div class="fr"><label class="fl">Nombre</label><input class="fi" id="nc-name" placeholder="Nombre de la categoría"></div>
    <div class="fr">
      <label class="fl">Tipo de acceso</label>
      <select class="fsel" id="nc-locked">
        <option value="false">🌐 Libre — todos pueden ver</option>
        <option value="true">🔒 Restringida — solo líderes</option>
      </select>
    </div>
    <div class="modal-acts">
      <button class="btn-cancel" onclick="closeCatModal()">Cancelar</button>
      <button class="btn-save" onclick="saveNewCat()">Crear categoría</button>
    </div>
  </div>
</div>

const ADMIN_EMAIL = 'jorge.villanueva@rappi.com';
const ADMIN_PASS  = 'rappi2026';
let S = { isAdmin:false, cats:[], links:[], collapsed:new Set(), editId:null, movingId:null };

function load(){
  try {
    const p = JSON.parse(localStorage.getItem('rh5') || 'null');
    if(p){ S.cats=p.cats||JSON.parse(JSON.stringify(CATS)); S.links=p.links||JSON.parse(JSON.stringify(BASE_LINKS)); S.collapsed=new Set(p.collapsed||[]); }
    else { S.cats=JSON.parse(JSON.stringify(CATS)); S.links=JSON.parse(JSON.stringify(BASE_LINKS)); }
  } catch { S.cats=JSON.parse(JSON.stringify(CATS)); S.links=JSON.parse(JSON.stringify(BASE_LINKS)); }
}
function save(){ localStorage.setItem('rh5', JSON.stringify({cats:S.cats, links:S.links, collapsed:[...S.collapsed]})); }

// ═══ AUTH (leaders only) ═══
function showLogin(){ document.getElementById('login-ov').classList.add('open'); document.getElementById('lerr').textContent=''; }
function hideLogin(){ document.getElementById('login-ov').classList.remove('open'); }
function doLogin(){
  const email = document.getElementById('le').value.trim().toLowerCase();
  const pass  = document.getElementById('lp').value;
  const err   = document.getElementById('lerr');
  if(!email.endsWith('@rappi.com')){ err.textContent='Solo correos @rappi.com'; return; }
  if(email !== ADMIN_EMAIL || pass !== ADMIN_PASS){ err.textContent='Acceso no autorizado'; return; }
  S.isAdmin = true;
  document.getElementById('user-area').style.display = 'flex';
  document.getElementById('uav').textContent = 'JV';
  document.getElementById('uname').textContent = 'Jorge Villanueva';
  document.getElementById('ubadge').textContent = 'Líder';
  document.getElementById('ubadge').className = 'tb-badge b-admin';
  document.getElementById('logout-btn').style.display = 'flex';
  hideLogin(); save(); render();
  showToast('Bienvenido, Jorge ✓', 'ok');
}
function doLogout(){
  S.isAdmin=false;
  ['user-area','logout-btn'].forEach(id => document.getElementById(id).style.display='none');
  render(); showToast('Sesión cerrada', 'ok');
}
document.addEventListener('keydown', e=>{
  if(e.key==='Escape'){ hideLogin(); closeModal(); }
  if(e.key==='Enter' && document.getElementById('login-ov').classList.contains('open')) doLogin();
});

  ticket:    {tag:'Ticket Jira',  color:'#E67E22',        btn:'🎫 Ticket',     cls:'btn-amber'},
  ppt:       {tag:'Deck',         color:'#8B6914',        btn:'📑 Ver deck',   cls:'btn-gold'},
};

let _vidIdx = 0;

function render(){ _vidIdx = 0; renderSidebar(); renderMain(); }
load(); render();
setupDragDelegation();

function renderSidebar(){
  let h = '<div class="sb-label">Navegación rápida</div>';
  [...S.cats].sort((a,b)=>a.order-b.order).forEach(c => {
    if(c.locked && !S.isAdmin) return;
    const cnt = S.links.filter(l=>l.catId===c.id).length;
    const open = !S.collapsed.has(c.id);
    h += `<div class="sb-item ${open?'active':''}" onclick="goTo('${c.id}')">
      <span class="sb-icon">${c.icon}</span>
      <span class="sb-name">${c.title}</span>
      ${c.locked ? '<span class="sb-lock">🔒</span>' : `<span class="sb-count">${cnt}</span>`}
    </div>`;
  });
  h += '<div class="sb-sep"></div>';
  if(!S.isAdmin){
    h += `<div class="sb-leaders-btn" onclick="showLogin()">
      <span class="sb-icon">🔒</span>
      <span class="sb-name">Recursos Líderes</span>
      <span style="font-size:10px">→</span>
    </div>`;
  }
  document.getElementById('sidebar').innerHTML = h;
}

function renderMain(){
  let h = '';
  [...S.cats].sort((a,b)=>a.order-b.order).forEach(c => {
    if(c.locked && !S.isAdmin) return;
    const links = S.links.filter(l=>l.catId===c.id);
    const open  = !S.collapsed.has(c.id);
    h += `<section class="cat-section" id="cat-${c.id}">
      <div class="cat-hd" onclick="toggleCat('${c.id}')">
        <div class="cat-arrow ${open?'open':''}">▶</div>
        <div class="cat-icon">${c.icon}</div>
        <div class="cat-title">${c.title}</div>
        <div class="cat-meta">
          ${c.locked ? '<span class="lock-badge">🔒 Solo líderes</span>' : ''}
          <span class="cat-count">${links.length} recursos</span>
          ${S.isAdmin ? `<button class="cat-edit-btn" onclick="event.stopPropagation();editCat('${c.id}')" title="Renombrar">✏️</button>` : ''}
        </div>
      </div>
      <div class="cat-body ${open?'open':''}">`;
    const subs = [...new Set(links.map(l=>l.subcat||''))];
    if(subs.length===1 && subs[0]===''){
      h += renderGrid(links);
    } else {
      subs.forEach(sub => {
        const sl = links.filter(l=>(l.subcat||'')=== sub);
        if(sub) h += `<div class="subcat-wrap"><div class="subcat-title">${sub}</div>${renderGrid(sl)}</div>`;
        else h += renderGrid(sl);
      });
    }
    if(!links.length) h += `<div class="empty-cat">📭 Sin recursos aún. <button class="open-btn btn-rappi" style="font-family:var(--font-display);font-weight:600" onclick="openAdd('${c.id}')">+ Agregar primero</button></div>`;
    h += '</div></section>';
  });
  if(!S.isAdmin){
    h += `<section class="cat-section" id="cat-leaders">
      <div class="cat-hd" onclick="showLogin()">
        <div class="cat-arrow">▶</div>
        <div class="cat-icon">🔒</div>
        <div class="cat-title">Recursos Líderes</div>
        <div class="cat-meta"><span class="lock-badge">🔒 Acceso restringido</span></div>
      </div>
      <div class="cat-body open">
        <div class="locked-block">
          <div class="locked-icon">🔐</div>
          <div class="locked-title">Sección de Líderes</div>
          <div class="locked-sub">Recursos exclusivos para líderes: reportes confidenciales, compensaciones y archivos estratégicos.</div>
          <button class="lock-btn" onclick="showLogin()">🔑 Iniciar sesión como líder</button>
        </div>
      </div>
    </section>`;
  }
  document.getElementById('main').innerHTML = h;
  // stagger animation delay per card
  document.querySelectorAll('.lcard').forEach((el,i) => { el.style.animationDelay = `${(i % 15)*28}ms`; });
  if(S.isAdmin) initDrag();
}

function renderGrid(links){
  if(!links.length) return '';
  return `<div class="links-grid" style="padding:0 22px 16px">${links.map(l=>renderCard(l)).join('')}</div>`;
}

function renderCard(lk){
  const cfg = TC[lk.type] || TC.link;
  const adm = S.isAdmin ? `
    <div class="cadmin">
      <button class="cact" title="Editar" onclick="editLink('${lk.id}')">✏️</button>
      <button class="cact" title="Mover categoría" onclick="openMoveModal('${lk.id}')">↕️</button>
      <button class="cact del" title="Eliminar" onclick="delLink('${lk.id}')">🗑</button>
    </div>` : '';

  if(lk.type === 'video'){
    const ci = _vidIdx++ % VID_COLORS.length;
    const [c1,c2] = VID_COLORS[ci];
    return `<div class="lcard" draggable="true" data-id="${lk.id}">
      ${S.isAdmin ? '<span class="drag-handle">⠿⠿</span>' : ''}
      <div class="vthumb">
        <div class="vthumb-gradient" style="background:linear-gradient(135deg,${c1} 0%,${c2} 100%)"></div>
        <div class="vthumb-bg">🎬</div>
        <div class="play-btn"><div class="play-circle">▶</div></div>
        ${lk.duration ? `<div class="vdur">${lk.duration}</div>` : ''}
        ${lk.channel  ? `<div class="vch">${lk.channel}</div>` : ''}
      </div>
      <div class="cbody">
        <div class="ctype" style="color:${cfg.color}"><span class="cdot"></span>${cfg.tag}</div>
        <div class="ctitle">${lk.title}</div>
        <div class="cdesc">${lk.desc||''}</div>
        <div class="cfoot"><a class="open-btn ${cfg.cls}" href="${lk.url}" target="_blank">${cfg.btn}</a>${adm}</div>
      </div></div>`;
  }
  if(lk.type === 'playbook'){
    return `<div class="lcard" draggable="true" data-id="${lk.id}">
      ${S.isAdmin ? '<span class="drag-handle">⠿⠿</span>' : ''}
      <div class="pb-tip">
        <div class="tip-tag">📘 Vista previa</div>
        <div class="tip-title">${lk.title}</div>
        <div class="tip-body">${lk.previewText || lk.desc || ''}</div>
      </div>
      <div class="cbody" style="padding-top:16px">
        <div class="ctype" style="color:${cfg.color}"><span class="cdot"></span>${cfg.tag}</div>
        <div class="ctitle">${lk.title}</div>
        <div class="cdesc">${lk.desc||''}</div>
        <div class="cfoot"><a class="open-btn ${cfg.cls}" href="${lk.url}" target="_blank">${cfg.btn}</a>${adm}</div>
      </div></div>`;
  }
  return `<div class="lcard" draggable="true" data-id="${lk.id}">
    ${S.isAdmin ? '<span class="drag-handle">⠿⠿</span>' : ''}
    <div class="cbody" style="padding-top:16px">
      <div class="ctype" style="color:${cfg.color}"><span class="cdot"></span>${cfg.tag}</div>
      <div class="ctitle">${lk.title}</div>
      <div class="cdesc">${lk.desc||''}</div>
      <div class="cfoot"><a class="open-btn ${cfg.cls}" href="${lk.url}" target="_blank">${cfg.btn}</a>${adm}</div>
    </div></div>`;
}

// ═══ DRAG & DROP — event delegation, funciona siempre post-render ═══
let _dragId = null;

// Se llama UNA sola vez al inicio, usa delegación en el contenedor
function setupDragDelegation(){
  const main = document.getElementById('main');

  main.addEventListener('dragstart', e => {
    if(!S.isAdmin) return;
    const card = e.target.closest('.lcard[data-id]');
    if(!card) return;
    _dragId = card.dataset.id;
    setTimeout(()=>card.classList.add('dragging'),0);
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', _dragId);
  });

  main.addEventListener('dragend', e => {
    _dragId = null;
    document.querySelectorAll('.lcard.dragging').forEach(x=>x.classList.remove('dragging'));
    document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
    document.querySelectorAll('.cat-hd.drag-target').forEach(x=>{
      x.classList.remove('drag-target');
      x.style.outline='';
    });
  });

  main.addEventListener('dragover', e => {
    if(!S.isAdmin || !_dragId) return;
    e.preventDefault();
    // Highlight card target
    const card = e.target.closest('.lcard[data-id]');
    document.querySelectorAll('.lcard.drag-over').forEach(x=>x.classList.remove('drag-over'));
    if(card && card.dataset.id !== _dragId) card.classList.add('drag-over');
    // Highlight category header target
    const catHd = e.target.closest('.cat-hd');
    document.querySelectorAll('.cat-hd').forEach(x=>{ x.style.outline=''; });
    if(catHd) catHd.style.outline='2px solid var(--rappi)';
  });

  main.addEventListener('dragleave', e => {
    if(!e.relatedTarget || !main.contains(e.relatedTarget)){
      document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
      document.querySelectorAll('.cat-hd').forEach(x=>{ x.style.outline=''; });
    }
  });

  main.addEventListener('drop', e => {
    if(!S.isAdmin || !_dragId) return;
    e.preventDefault();
    document.querySelectorAll('.drag-over').forEach(x=>x.classList.remove('drag-over'));
    document.querySelectorAll('.cat-hd').forEach(x=>{ x.style.outline=''; });

    const fromLk = S.links.find(l=>l.id===_dragId);
    if(!fromLk) return;

    // Drop on a card?
    const targetCard = e.target.closest('.lcard[data-id]');
    if(targetCard && targetCard.dataset.id !== _dragId){
      const toLk = S.links.find(l=>l.id===targetCard.dataset.id);
      if(toLk){
        const movedCat = fromLk.catId !== toLk.catId;
        fromLk.catId  = toLk.catId;
        fromLk.subcat = toLk.subcat;
        const fi = S.links.indexOf(fromLk);
        const ti = S.links.indexOf(toLk);
        S.links.splice(fi,1);
        S.links.splice(ti < fi ? ti : ti, 0, fromLk);
        save(); render();
        if(movedCat) showToast('✓ Movido a ' + (S.cats.find(c=>c.id===fromLk.catId)||{title:''}).title, 'ok');
        else showToast('✓ Reordenado', 'ok');
        return;
      }
    }

    // Drop on a category header?
    const targetHd = e.target.closest('.cat-hd');
    if(targetHd){
      const sec = targetHd.closest('.cat-section');
      if(sec){
        const catId = sec.id.replace('cat-','');
        if(fromLk.catId !== catId){
          fromLk.catId  = catId;
          fromLk.subcat = '';
          save(); render();
          const cat = S.cats.find(c=>c.id===catId);
          showToast('✓ Movido a ' + (cat ? cat.title : catId), 'ok');
        }
      }
    }
  });
}

// Stub — initDrag ya no hace nada, la delegación está en setupDragDelegation
function initDrag(){}

// ═══ MOVE MODAL ═══
function openMoveModal(id){
  S.movingId = id;
  const lk = S.links.find(l=>l.id===id);
  if(!lk) return;
  // Reuse the add modal as a move modal
  document.getElementById('mtitle').textContent = 'Mover / Cambiar categoría';
  document.getElementById('ft').value  = lk.title;
  document.getElementById('fu').value  = lk.url;
  document.getElementById('fd').value  = lk.desc||'';
  document.getElementById('ftype').value = lk.type;
  document.getElementById('fdur').value  = lk.duration||'';
  document.getElementById('fprev').value = lk.previewText||'';
  document.getElementById('fsub').value  = lk.subcat||'';
  onType();
  populateCatSel(lk.catId);
  document.getElementById('mov').classList.add('open');
}

// ═══ INTERACTIONS ═══
function toggleCat(id){ if(S.collapsed.has(id)) S.collapsed.delete(id); else S.collapsed.add(id); save(); render(); }
function goTo(id){
  if(S.collapsed.has(id)){ S.collapsed.delete(id); save(); render(); }
  setTimeout(()=>{ const el=document.getElementById('cat-'+id); if(el) el.scrollIntoView({behavior:'smooth',block:'start'}); }, 50);
}
function doSearch(q){
  const t = q.toLowerCase().trim();
  document.querySelectorAll('.lcard').forEach(c => { c.classList.toggle('hs', !!(t && !c.innerText.toLowerCase().includes(t))); });
}

// ═══ ADMIN CRUD ═══
function openAdd(catId){
  S.editId = null; S.movingId = null;
  document.getElementById('mtitle').textContent = 'Agregar recurso';
  ['ft','fu','fd','fdur','fprev','fsub'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('ftype').value = 'link'; onType();
  populateCatSel(catId);
  document.getElementById('mov').classList.add('open');
}
function editLink(id){
  if(!S.isAdmin) return;
  S.movingId = null;
  const lk = S.links.find(l=>l.id===id); if(!lk) return;
  S.editId = id;
  document.getElementById('mtitle').textContent = 'Editar recurso';
  document.getElementById('ft').value  = lk.title;
  document.getElementById('fu').value  = lk.url;
  document.getElementById('fd').value  = lk.desc||'';
  document.getElementById('ftype').value = lk.type;
  document.getElementById('fdur').value  = lk.duration||'';
  document.getElementById('fprev').value = lk.previewText||'';
  document.getElementById('fsub').value  = lk.subcat||'';
  onType(); populateCatSel(lk.catId);
  document.getElementById('mov').classList.add('open');
}
function onType(){
  const t = document.getElementById('ftype').value;
  document.getElementById('rdur').style.display  = t==='video' ? 'block' : 'none';
  document.getElementById('rprev').style.display = t==='playbook' ? 'block' : 'none';
}
function populateCatSel(sel){
  document.getElementById('fcat').innerHTML = S.cats.sort((a,b)=>a.order-b.order)
    .map(c => `<option value="${c.id}"${c.id===sel?' selected':''}>${c.icon} ${c.title}</option>`).join('');
}
function saveLink(){
  const title = document.getElementById('ft').value.trim();
  const url   = document.getElementById('fu').value.trim();
  if(!title || !url){ showToast('Título y URL requeridos','err'); return; }
  const obj = {
    id: S.editId || S.movingId || 'l'+Date.now(),
    catId:       document.getElementById('fcat').value,
    subcat:      document.getElementById('fsub').value.trim(),
    type:        document.getElementById('ftype').value,
    title, url,
    desc:        document.getElementById('fd').value.trim(),
    duration:    document.getElementById('fdur').value.trim(),
    previewText: document.getElementById('fprev').value.trim(),
  };
  if(S.editId || S.movingId){
    const i = S.links.findIndex(l=>l.id===(S.editId||S.movingId));
    if(i>=0) S.links[i]=obj;
    showToast(S.movingId ? 'Movido ✓' : 'Actualizado ✓', 'ok');
  } else {
    S.links.push(obj);
    showToast('Recurso agregado ✓','ok');
  }
  save(); closeModal(); render();
}
function delLink(id){
  if(!confirm('¿Eliminar este recurso?')) return;
  S.links = S.links.filter(l=>l.id!==id);
  save(); render(); showToast('Eliminado','ok');
}
function editCat(id){
  const c = S.cats.find(x=>x.id===id); if(!c) return;
  const n = prompt('Nombre de la categoría:', c.title);
  if(n && n.trim()){ c.title=n.trim(); save(); render(); }
}
function closeModal(){ document.getElementById('mov').classList.remove('open'); S.editId=null; S.movingId=null; }
document.getElementById('mov').addEventListener('click', e=>{ if(e.target===document.getElementById('mov')) closeModal(); });
document.getElementById('login-ov').addEventListener('click', e=>{ if(e.target===document.getElementById('login-ov')) hideLogin(); });

let tt;
function showToast(msg, type='ok'){
  const t = document.getElementById('toast');
  t.textContent=msg; t.className=`toast ${type} show`;
  clearTimeout(tt); tt=setTimeout(()=>t.classList.remove('show'), 2600);
}

// ═══ CURSOR ═══
(function(){
  const cur=document.getElementById('cur'), ring=document.getElementById('cur-ring');
  if(!cur||!ring) return;
  let mx=0,my=0,rx=0,ry=0;
  document.addEventListener('mousemove',e=>{
    mx=e.clientX; my=e.clientY;
    cur.style.left=mx+'px'; cur.style.top=my+'px';
  });
  (function loop(){
    rx+=(mx-rx)*0.13; ry+=(my-ry)*0.13;
    ring.style.left=rx+'px'; ring.style.top=ry+'px';
    requestAnimationFrame(loop);
  })();
  const hoverSel='a,button,.sb-item,.cat-hd,.lcard,.open-btn,.lock-btn,.login-btn,.tb-btn,.sb-leaders-btn';
  document.addEventListener('mouseover',e=>{ if(e.target.closest(hoverSel)) document.body.classList.add('ch'); });
  document.addEventListener('mouseout', e=>{ if(e.target.closest(hoverSel)) document.body.classList.remove('ch'); });
  document.addEventListener('mousedown',()=>document.body.classList.add('ck'));
  document.addEventListener('mouseup',()=>document.body.classList.remove('ck'));
})();

// ═══ CLICK SOUND ═══
function playClick(){
  try{
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx.createOscillator(), g=ctx.createGain();
    o.connect(g); g.connect(ctx.destination);
    o.type='sine';
    o.frequency.setValueAtTime(700,ctx.currentTime);
    o.frequency.exponentialRampToValueAtTime(350,ctx.currentTime+0.07);
    g.gain.setValueAtTime(0.06,ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001,ctx.currentTime+0.09);
    o.start(); o.stop(ctx.currentTime+0.09);
  }catch(e){}
}
document.addEventListener('click',e=>{
  if(e.target.closest('a,button,.sb-item,.cat-hd,.open-btn,.lock-btn')) playClick();
});

// ═══ NUEVA CATEGORÍA ═══
function openNewCat(){
  document.getElementById('nc-icon').value='📁';
  document.getElementById('nc-name').value='';
  document.getElementById('nc-locked').value='false';
  document.getElementById('cat-modal').classList.add('open');
  setTimeout(()=>document.getElementById('nc-name').focus(),100);
}
function closeCatModal(){ document.getElementById('cat-modal').classList.remove('open'); }
function saveNewCat(){
  const icon  = document.getElementById('nc-icon').value.trim() || '📁';
  const name  = document.getElementById('nc-name').value.trim();
  const locked= document.getElementById('nc-locked').value === 'true';
  if(!name){ showToast('Escribe un nombre para la categoría','err'); return; }
  const id = 'cat_' + Date.now();
  const maxOrder = Math.max(...S.cats.map(c=>c.order), -1);
  S.cats.push({id, icon, title:name, locked, order: maxOrder+1});
  save(); closeCatModal(); render();
  showToast('Categoría "'+name+'" creada ✓','ok');
  setTimeout(()=>goTo(id), 150);
}
document.getElementById('cat-modal').addEventListener('click',e=>{
  if(e.target===document.getElementById('cat-modal')) closeCatModal();
});
document.addEventListener('keydown',e=>{
  if(e.key==='Enter' && document.getElementById('cat-modal').classList.contains('open')) saveNewCat();
});
